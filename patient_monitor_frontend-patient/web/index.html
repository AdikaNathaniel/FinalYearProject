<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
  <meta name="description" content="A new Flutter project.">
  
  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="pregnancy-monitor">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>
  
  <title>pregnancy-monitor</title>
  <link rel="manifest" href="manifest.json">
  
  <!-- Face API Library -->
  <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
</head>
<body>
  <!-- Flutter Bootstrap Script -->
  <script src="flutter_bootstrap.js" async></script>

<script src="https://unpkg.com/webrtc-adapter@7.4.0/adapter.js"></script>
<script src="https://cdn.jsdelivr.net/npm/peerjs@1.3.1/dist/peerjs.min.js"></script>
  
  <!-- Google Maps API Integration -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBPN4hKbBvu7FMXs6q9bxQdRqMbnairj9g&callback=initMap&libraries=places" async defer></script>
  
  <script>
    function initMap() {
      console.log("Google Maps API loaded successfully.");
    }

    document.addEventListener('DOMContentLoaded', function() {
      const checkFaceApi = setInterval(() => {
        if (window.faceapi) {
          clearInterval(checkFaceApi);
          console.log("Face API detected, setting up methods");
          setupFaceApiMethods();
        }
      }, 100);
    });

    function setupFaceApiMethods() {
      async function loadModels() {
        try {
          await faceapi.nets.tinyFaceDetector.loadFromUri('/models');
          console.log("TinyFaceDetector model loaded successfully.");
          return true;
        } catch (error) {
          console.error("Error loading Face API models:", error);
          return false;
        }
      }

      async function detectSingleFace(input) {
        try {
          if (!faceapi.TinyFaceDetectorOptions) {
            console.error("TinyFaceDetectorOptions not available");
            return null;
          }

          const options = new faceapi.TinyFaceDetectorOptions();
          return await faceapi.detectSingleFace(input, options);
        } catch (error) {
          console.error("Error in face detection:", error);
          return null;
        }
      }

      async function getFaceDescriptor(detection) {
        try {
          return detection?.descriptor ?? null;
        } catch (error) {
          console.error("Error getting face descriptor:", error);
          return null;
        }
      }

      if (window.flutter_inappwebview) {
        window.flutter_inappwebview.registerViewFactory('video', (viewId) => {
          const video = document.createElement('video');
          video.id = 'video-' + viewId;
          video.autoplay = true;
          video.playsInline = true;
          return video;
        });
      }

      window.faceapi = {
        ...window.faceapi,
        loadModels,
        detectSingleFace,
        getFaceDescriptor,
      };

      console.log("Face API methods setup complete");
    }
  </script>

  <div id="flutter_target"></div>
</body>
</html>
