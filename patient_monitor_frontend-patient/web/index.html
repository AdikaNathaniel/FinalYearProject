
<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
  <meta name="description" content="A new Flutter project.">
  
  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="pregnancy-monitor">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>
  
  <title>pregnancy-monitor</title>
  <link rel="manifest" href="manifest.json">
  
  <!-- Face API Library - Make sure it loads completely before using it -->
  <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
</head>
<body>
  <!-- Flutter Bootstrap Script -->
  <script src="flutter_bootstrap.js" async></script>
  
  <!-- Google Maps API Integration -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBPN4hKbBvu7FMXs6q9bxQdRqMbnairj9g&callback=initMap&libraries=places" async defer></script>
  
  <script>
    // Google Maps Initialization
    function initMap() {
      console.log("Google Maps API loaded successfully.");
      // Initialize map logic here (optional)
    }
    
    // Wait for document and face-api to be fully loaded
    document.addEventListener('DOMContentLoaded', function() {
      // Check if face-api is loaded every 100ms
      const checkFaceApi = setInterval(() => {
        if (window.faceapi) {
          clearInterval(checkFaceApi);
          console.log("Face API detected, setting up methods");
          setupFaceApiMethods();
        }
      }, 100);
    });
    
    // Setup face-api methods after it's properly loaded
    function setupFaceApiMethods() {
      // Face API.js Initialization
      async function loadModels() {
        try {
          await faceapi.nets.tinyFaceDetector.loadFromUri('/models');
          await faceapi.nets.faceLandmark68Net.loadFromUri('/models');
          await faceapi.nets.faceRecognitionNet.loadFromUri('/models');
          await faceapi.nets.faceExpressionNet.loadFromUri('/models');
          console.log("Face API models loaded successfully.");
          return true;
        } catch (error) {
          console.error("Error loading Face API models:", error);
          return false;
        }
      }
      
      // Detect faces in an image or video element
      async function detectSingleFace(input) {
        try {
          // Make sure TinyFaceDetectorOptions exists before using it
          if (!faceapi.TinyFaceDetectorOptions) {
            console.error("TinyFaceDetectorOptions not available");
            return null;
          }
          
          const options = new faceapi.TinyFaceDetectorOptions();
          return await faceapi.detectSingleFace(input, options)
            .withFaceLandmarks()
            .withFaceDescriptor();
        } catch (error) {
          console.error("Error in face detection:", error);
          return null;
        }
      }
      
      // Get face descriptor from detection
      async function getFaceDescriptor(detection) {
        try {
          return detection.descriptor;
        } catch (error) {
          console.error("Error getting face descriptor:", error);
          return null;
        }
      }
      
      // Register video element view factory for Flutter
      if (window.flutter_inappwebview) {
        window.flutter_inappwebview.registerViewFactory('video', (viewId) => {
          const video = document.createElement('video');
          video.id = 'video-' + viewId;
          video.autoplay = true;
          video.playsInline = true;
          return video;
        });
      }
      
      // Make functions available to Dart
      window.faceapi = {
        ...window.faceapi, // Keep existing properties
        loadModels,
        detectSingleFace,
        getFaceDescriptor,
      };
      
      console.log("Face API methods setup complete");
    }
  </script>
  
  <!-- Flutter target div -->
  <div id="flutter_target"></div>
</body>
</html>
